name: Firestore rules

'on':
  push:
    branches:
      - main
    paths:
      - 'firestore.rules'
      - 'storage.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
      - 'tests/rules/**'
      - '.github/workflows/firestore-rules.yml'
  pull_request:
    paths:
      - 'firestore.rules'
      - 'storage.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
      - 'tests/rules/**'
      - '.github/workflows/firestore-rules.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Compile + exercise the rules against the emulator. Runs on every PR and push.
  test-rules:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # The Firestore emulator needs a JRE.
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Run Firestore rules tests
        run: npm run test:rules

  # Deploy rules + indexes + storage rules. Only on merge to main, and only
  # after the rules tests pass. Kept separate from the Hosting workflow so a
  # rules failure never shows up as an ambiguous Hosting result.
  deploy-rules:
    needs: test-rules
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Firestore rules, indexes, and Storage rules
        uses: w9jds/firebase-action@v13.13.1
        with:
          args: deploy --only firestore:rules,firestore:indexes,storage --project stowaway-eb942 --non-interactive
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STOWAWAY_EB942 }}
